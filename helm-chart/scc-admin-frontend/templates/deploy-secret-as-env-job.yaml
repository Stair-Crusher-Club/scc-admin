apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "scc-admin-frontend.fullname" . }}-deploy-secret-as-env
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "20"
spec:
  template:
    spec:
      serviceAccountName: {{ include "scc-admin-frontend.serviceAccountName" . }}-deploy-secret
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "mozilla/sops:v3-alpine"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh"]
          # secret.yaml의 kebab-case 키를 UPPER_SNAKE_CASE 환경변수로 자동 변환.
          # 예: notion-attendance-api-token → NOTION_ATTENDANCE_API_TOKEN
          # 새 키 추가 시 secret.yaml만 수정하면 됨 (이 job과 deployment.yaml 수정 불필요).
          args:
            - -c
            - >-
              wget "https://dl.k8s.io/release/$(wget https://dl.k8s.io/release/stable.txt -O-)/bin/linux/amd64/kubectl" &&
              chmod u+x kubectl &&
              sops -d /app/conf/secret-raw.yaml > /tmp/plain.yaml &&
              ARGS="" &&
              while IFS= read -r line; do
                key=$(echo "$line" | cut -d: -f1 | xargs) &&
                value=$(echo "$line" | cut -d: -f2- | xargs) &&
                [ -z "$key" ] && continue;
                ENV_KEY=$(echo "$key" | tr '-' '_' | tr 'a-z' 'A-Z') &&
                ARGS="$ARGS --from-literal=$ENV_KEY=$value";
              done < /tmp/plain.yaml &&
              ./kubectl create secret generic scc-admin-secrets $ARGS --dry-run=client -o yaml | ./kubectl apply -f -
          env:
            - name: AWS_STS_REGIONAL_ENDPOINTS
              value: regional
            - name: AWS_REGION
              value: ap-northeast-2
            - name: AWS_ROLE_ARN
              value: "{{ .Values.deploySecret.awsRoleArn }}"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
          volumeMounts:
            - name: aws-iam-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true
            - name: config-volume
              mountPath: /app/conf
              readOnly: true
      volumes:
        - name: aws-iam-token
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  audience: sts.amazonaws.com
                  expirationSeconds: 86400
                  path: token
        - name: config-volume
          configMap:
            name: {{ include "scc-admin-frontend.fullname" . }}
      restartPolicy: Never
  backoffLimit: 3
