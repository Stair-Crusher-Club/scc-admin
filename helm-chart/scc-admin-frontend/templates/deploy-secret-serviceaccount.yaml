apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "scc-admin-frontend.serviceAccountName" . }}-deploy-secret
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "scc-admin-frontend.fullname" . }}-create-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "10"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "scc-admin-frontend.fullname" . }}-create-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "10"
subjects:
  - kind: ServiceAccount
    name: {{ include "scc-admin-frontend.serviceAccountName" . }}-deploy-secret
roleRef:
  kind: Role
  name: {{ include "scc-admin-frontend.fullname" . }}-create-secrets
  apiGroup: rbac.authorization.k8s.io
